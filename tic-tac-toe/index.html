<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe game</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
        <pre>
            <h1>T I C  T A C  T O E</h1>
        </pre>
        
        <div id="result-popup">
            <h2 id="result-text"></h2>
        </div>
        <div class="container">
             <div class="game">
            <button class="box" data-index="0"></button>
            <button class="box" data-index="1"></button>
            <button class="box" data-index="2"></button>
            <button class="box" data-index="3"></button>
            <button class="box" data-index="4"></button>
            <button class="box" data-index="5"></button>
            <button class="box" data-index="6"></button>
            <button class="box" data-index="7"></button>
            <button class="box" data-index="8"></button>
                <div class="difficulty-scroll">
                <button id="easy" onclick="setDifficulty('easy')">Easy</button>
                <button id="medium" onclick="setDifficulty('medium')">Medium</button>
                <button id="hard" onclick="setDifficulty('hard')">Hard</button>
            </div>
        </div>
        </div>
           
        <button id="reset_but" onclick="restartGame()">Restart Game</button>
          
    </main>
    <script src="source1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
